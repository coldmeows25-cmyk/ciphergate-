<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ciphergate Access</title>

  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
      margin-top: 100px;
    }

    input {
      padding: 10px;
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      outline: none;
    }

    button {
      padding: 10px 20px;
      background: #00ffcc;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    #welcome {
      display: none;
      font-size: 24px;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #00ffcc; }
      to { text-shadow: 0 0 20px #00ffcc; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <h2>ENTER ACCESS CODE</h2>
    <input id="answer" placeholder="Enter code..." />
    <br>
    <button onclick="checkCode()">ENTER</button>
    <p id="message"></p>
  </div>

  <!-- WELCOME -->
  <div id="welcome">
    <h1>WELCOME TO CIPHERGATE</h1>
    <p>ACCESS GRANTED</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
